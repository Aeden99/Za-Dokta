      macros: {

        tw: '{\\mathrm{tw}}',
        Li: '{\\operatorname{Li}}',
        Res: '{\\operatorname{Res}}'
      }

    options: {
      // Don't typeset code blocks / inline code.
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],

</script>
